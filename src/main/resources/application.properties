# ===============================
# SERVER CONFIG
# ===============================
server.port=8082
spring.application.name=PolicyService

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smartsure_policy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pramod280504
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOL (Hikari - OPTIMIZED)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JWT CONFIG (VERY IMPORTANT)
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey12345
jwt.expiration=3600000

# ===============================
# SWAGGER / OPENAPI CONFIG
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# ===============================
# SCHEDULER
# ===============================
spring.task.scheduling.pool.size=5

# ===============================
# EUREKA (DISABLED FOR NOW)
# ===============================
eureka.client.enabled=false


# ACTUATOR

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ===============================
# CORS
# ===============================
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# ===============================
# EMAIL (Gmail )
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${pramodkatchala@gmail.com}
spring.mail.password=${!Pramod280504}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
notification.from-email=noreply@smartsure.com

# ===============================
# ASYNC THREAD POOL (for email)
# ===============================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# Don't let mail failure bring the whole health check DOWN
management.health.mail.enabled=false

# Don't let redis failure bring health DOWN while testing without Redis
management.health.redis.enabled=false